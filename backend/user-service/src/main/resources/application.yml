server:
  port: 8081

spring:
  application:
    name: user-service

  datasource:
    url: jdbc:mysql://localhost:3306/ai_demo?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver

  redis:
    host: localhost
    port: 6379
    database: 0
    # password: 
    timeout: 3000ms
    lettuce:
      pool:
        max-active: 16
        max-idle: 8
        min-idle: 0

# MyBatis-Plus 配置
mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
  mapper-locations: classpath*:mapper/**/*.xml

# JWT 配置
jwt:
  # 生产环境请改为从环境变量或密钥管理服务读取
  secret: ai-demo-jwt-secret-key-please-change-in-production-environment-2026
  # Access Token 有效期：2小时（单位：毫秒）
  access-token-expire: 7200000
  # Refresh Token 有效期：7天（单位：毫秒）
  refresh-token-expire: 604800000
  # Token 请求头名称
  header: Authorization
  # Token 前缀
  token-prefix: "Bearer "

# 验证码配置
sms:
  # 验证码有效期（秒）
  code-expire-seconds: 300
  # 同一手机号发送间隔（秒）
  send-interval-seconds: 60
  # 演示环境固定验证码（不为空则使用固定值，生产置空）
  mock-code: "123456"

# 微信开放平台配置（演示配置，生产环境请替换真实参数）
wechat:
  app-id: demo-wx-app-id
  app-secret: demo-wx-app-secret
  redirect-uri: http://localhost:5173/login
  # 术/scope
  scope: snsapi_login
  # 二维码/登录状态轮询卡过期时间（秒）
  state-expire-seconds: 300
  # 是否启用模拟模式（true 时不调用真实微信 API，从 demo 帐号向后填充用户）
  mock: true

management:
  endpoints:
    web:
      exposure:
        include: health,info

logging:
  level:
    com.example.userservice: debug
