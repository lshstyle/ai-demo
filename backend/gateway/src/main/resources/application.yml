server:
  port: 8080

spring:
  application:
    name: gateway
  cloud:
    gateway:
      routes:
        - id: user-service
          uri: http://localhost:8081
          predicates:
            - Path=/api/**
          filters:
            - StripPrefix=1
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOrigins: "*"
            allowedMethods: "*"
            allowedHeaders: "*"

# JWT 配置（与 user-service 保持一致的 secret）
jwt:
  secret: ai-demo-jwt-secret-key-please-change-in-production-environment-2026
  header: Authorization
  token-prefix: "Bearer "
  # 白名单路径（AntPathMatcher 语法），命中则不校验 Token
  whitelist:
    - /api/auth/login
    - /api/auth/login/phone
    - /api/auth/wechat/**
    - /api/sms/send
    - /actuator/**

management:
  endpoints:
    web:
      exposure:
        include: health,info,gateway
